<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WeekUp · Telegram Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <style>
    :root {
      --bg: #fff8ef;
      --bg-elevated: #fff3e3;
      --bg-elevated-strong: #ffe3c7;
      --bg-soft: #fff2e0;
      --fg: #1f160f;
      --muted: #7a6f63;
      --accent: #ff6b3d;
      --accent-soft: rgba(255, 107, 61, .08);
      --accent-strong: #ff9d78;
      --border-subtle: rgba(0, 0, 0, .06);
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, .06);
      --shadow-md: 0 18px 45px rgba(0, 0, 0, .12);
      --shadow-lg: 0 24px 60px rgba(0, 0, 0, .18);
      --radius-lg: 24px;
      --radius-full: 999px;
      --spring: 220ms cubic-bezier(0.18, 0.89, 0.32, 1.28);
      --text-xs: 11px;
      --text-sm: 13px;
      --text-md: 15px;
      --text-lg: 17px;
      --text-xl: 20px;
      --text-2xl: 24px;
    }

    :root[data-theme="dark"] {
      --bg: #131110;
      --bg-elevated: #1c1815;
      --bg-elevated-strong: #26201b;
      --bg-soft: #191512;
      --fg: #f5ede4;
      --muted: #a2988b;
      --accent: #ff9d78;
      --accent-soft: rgba(255, 157, 120, .14);
      --accent-strong: #ffb48f;
      --border-subtle: rgba(255, 255, 255, .08);
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, .7);
      --shadow-md: 0 18px 45px rgba(0, 0, 0, .75);
      --shadow-lg: 0 24px 60px rgba(0, 0, 0, .8);
    }

    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .app {
      position: relative;
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: radial-gradient(circle at top, #ffe8d5 0%, var(--bg) 55%);
      padding: 16px 16px 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg,#ff9d78,#ff6b3d 58%,#ffbe2e);
      color: #fff;
      box-shadow: 0 12px 22px rgba(255,107,61,.25), inset 0 1px 0 rgba(255,255,255,.5);
    }
    .brand-title {
      font-size: var(--text-md);
      font-weight: 700;
    }
    .brand-subtitle {
      font-size: var(--text-xs);
      color: var(--muted);
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: none;
      background: var(--bg-elevated);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 15px;
    }

    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }

    .card {
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.88);
      box-shadow: var(--shadow-md);
      padding: 18px 16px 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    :root[data-theme="dark"] .card {
      background: rgba(20,18,16,0.96);
    }

    .hero {
      margin-bottom: 16px;
    }

    .eyebrow {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: var(--text-2xl);
      letter-spacing: -0.03em;
    }
    p {
      margin: 4px 0 0;
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .primary-btn {
      width: 100%;
      border-radius: var(--radius-full);
      border: none;
      padding: 11px 18px;
      font-size: var(--text-md);
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(145deg,#ff9d78,#ff6b3d 58%,#ffbe2e);
      box-shadow: 0 16px 30px rgba(255,107,61,.35);
    }

    .language-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .lang-btn {
      border-radius: 18px;
      border: 1px solid var(--border-subtle);
      padding: 10px 10px 9px;
      background: rgba(255,255,255,0.96);
      cursor: pointer;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: var(--text-sm);
    }
    :root[data-theme="dark"] .lang-btn {
      background: rgba(22,19,17,0.96);
    }
    .lang-btn strong {
      font-size: var(--text-md);
    }
    .lang-btn span {
      font-size: var(--text-xs);
      color: var(--muted);
    }
    .lang-btn.selected {
      border-color: rgba(255,107,61,.5);
      box-shadow: 0 10px 26px rgba(255,107,61,.25);
      background: radial-gradient(circle at top left,#ffe8d6 0%,#fffdf8 40%,#fff6ea 88%);
    }

    .tiny {
      font-size: var(--text-xs);
      color: var(--muted);
    }

    .view {
      display: none;
    }
    .view.active {
      display: block;
    }
    .view.hidden {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 8px 10px;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      font-size: var(--text-sm);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 14px 25px rgba(255,107,61,.4);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: var(--text-xs);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(16px);
      padding: 9px 14px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: var(--text-sm);
      font-weight: 700;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--spring), transform var(--spring);
      z-index: 30;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 390px) {
      .language-grid,
      .double-grid,
      .triple-grid,
      .stats,
      .score-grid,
      .backend-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
